<!DOCTYPE html>
<html lang="pt-BR">

<head>
    {% include "global/partials/head.html" %}
    <title>Login</title>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="d-flex align-items-center justify-content-center" style="height: 100vh;">
                <div class="col-12 col-md-6 col-lg-4 text-center form-container">
                    <form method="post">
                        {% csrf_token %}
                        <div class="row mb-3">
                            <label for="{{ form.username.id_for_label }}" class="col-sm-2 col-form-label">{{ form.username.label }}</label>
                            <div class="col-sm-10">
                                {{ form.username }}
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label for="{{ form.password.id_for_label }}" class="col-sm-2 col-form-label">{{ form.password.label }}</label>
                            <div class="col-sm-10">
                                {{ form.password }}
                            </div>
                        </div>
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">
                            {{ message }}
                        </div>
                        {% endfor %}
                        <button type="submit" class="btn btn-success mt-1">Entrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <style>
        body{
            background: linear-gradient(to bottom, #f4f4f9, #e9ecef);
        }
    </style>
    {% include "global/partials/footer.html" %}
</body>

</html>

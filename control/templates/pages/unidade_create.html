{% extends "pages/index_control.html" %}
{% block sub_page_title %}Cadastrar Unidade{% endblock sub_page_title %}
{% block sub_content %}
<div class="container mt-1">
    <div class="row justify-content-center">
        <div class="col-12col-md-6 card p-4 shadow-sm">
            <h3 class="mb-4 border-bottom pb-2">Nova Unidade</h3>
            
            <form method="post">
                {% csrf_token %}
                
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Salvar Unidade</button>
                    <a href="{% url 'control:unidades' %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
